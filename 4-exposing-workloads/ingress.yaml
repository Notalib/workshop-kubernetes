# SOLUTION — completed Ingress routing demo.localhost -> the `demo` Service (TASK 4).
# Rancher Desktop / k3d use "traefik"; on kind with ingress-nginx use "nginx".
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo
spec:
  ingressClassName: traefik
  rules:
    - host: demo.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo
                port:
                  number: 80
