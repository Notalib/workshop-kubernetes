# SOLUTION — completed Service in front of the `demo` Deployment (module 4, TASK 4).
apiVersion: v1
kind: Service
metadata:
  name: demo
spec:
  selector:
    app: demo          # matches the Pods labelled app=demo
  ports:
    - port: 80         # port the Service exposes
      targetPort: 80   # port on the Pod/container
  # type defaults to ClusterIP — what we want behind an Ingress.
