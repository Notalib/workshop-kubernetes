# SOLUTION — completed Deployment manifest (module 1, TASK 8).
# Docs: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  labels:
    app: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo          # selects the Pods this Deployment owns
  template:
    metadata:
      labels:
        app: demo        # must match the selector above
    spec:
      containers:
        - name: nginx
          image: nginx:1.27   # pinned tag, never :latest
          ports:
            - containerPort: 80
