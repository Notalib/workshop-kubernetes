# SOLUTION — app tier (module 5, TASK 3). Verified on Rancher Desktop / k3s.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # A Service named "postgres" makes Kubernetes inject legacy env vars like
      # POSTGRES_PORT=tcp://<ip>:5432, which would collide with this app's own
      # POSTGRES_PORT and corrupt its JDBC URL. Disable those legacy service-link vars —
      # we discover the DB via DNS + explicit config, not these. (Provided for you.)
      enableServiceLinks: false
      containers:
        - name: backend
          image: ghcr.io/notalib/workshop-containerisation/spring-postgres
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greetings
spec:
  ingressClassName: traefik
  rules:
    - host: greetings.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
