# The app tier (TASK 3): the Spring Boot backend, its Service, and an Ingress.
# Fill in the TODOs (env wiring + ingress).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # A Service named "postgres" makes Kubernetes inject legacy env vars like
      # POSTGRES_PORT=tcp://<ip>:5432, which would collide with this app's own
      # POSTGRES_PORT and corrupt its JDBC URL. Disable those legacy service-link vars —
      # we discover the DB via DNS + explicit config, not these. (Provided for you.)
      enableServiceLinks: false
      containers:
        - name: backend
          # The image you built in Workshop #1 (must be public on GHCR).
          image: ghcr.io/notalib/workshop-containerisation/spring-postgres
          ports:
            - containerPort: 8080
          env:
            # TODO: database name — import it from the ConfigMap (configMapKeyRef).
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: # ___
                  key: # ___
            # TODO: database host — import POSTGRES_HOST from the ConfigMap too. This is
            #       how the backend finds the DB Service; it must match the Service name.
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: # ___
                  key: # ___
            # TODO: database password — import it from the Secret (secretKeyRef).
            #       Must be the SAME value Postgres uses, or the backend can't log in.
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: # ___
                  key: # ___
          # Health probes (provided for you — see the README note).
          # readiness gates traffic: the Pod joins the Service only once /readyz returns
          # 200, which is what avoids the brief 502 while Spring is still starting.
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          # liveness restarts the container if /healthz stops responding. The generous
          # initialDelaySeconds gives Spring time to boot before liveness can fail.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: greetings
spec:
  # TODO: which ingress controller? (traefik on Rancher Desktop)
  ingressClassName: # ___
  rules:
    - host: greetings.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # TODO: route to which Service, on which port?
                name: # ___
                port:
                  number: # ___
