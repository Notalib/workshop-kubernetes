# Two containers in one Pod sharing an emptyDir volume (TASK 1).
# writer appends a timestamp every 2s; reader tails the same file.
# Both mount the SAME volume at /shared — that's how they share data.
apiVersion: v1
kind: Pod
metadata:
  name: shared
  labels:
    app: shared
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command: ["sh", "-c", "while true; do echo \"$(date) tick\" >> /shared/out.txt; sleep 2; done"]
      volumeMounts:
        - name: scratch
          mountPath: /shared
    - name: reader
      image: busybox:1.36
      command: ["sh", "-c", "sleep 2; tail -f /shared/out.txt"]
      volumeMounts:
        - name: scratch
          mountPath: /shared
  volumes:
    - name: scratch
      emptyDir: {}
