# A Pod that mounts the PVC at /data and then idles (TASK 2 + 3).
# Fill in the claimName TODO to point at the PVC from pvc.yaml.
apiVersion: v1
kind: Pod
metadata:
  name: keeper
  labels:
    app: keeper
spec:
  containers:
    - name: shell
      image: busybox:1.36
      command: ["sh", "-c", "sleep 86400"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        # TODO: name of the PVC to mount (see pvc.yaml)
        claimName: # ___
