# SOLUTION — completed PersistentVolumeClaim (module 3, TASK 2).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: demo-data
spec:
  # Set explicitly so the claim always lands on local-path, even on clusters that
  # have more than one default StorageClass. Drop this line to use the default.
  storageClassName: local-path
  accessModes:
    - ReadWriteOnce      # mountable by one node at a time — fine for a single Pod
  resources:
    requests:
      storage: 1Gi
