# Custom HTML served by nginx, stored as a ConfigMap (TASK 1).
# Edit the page, re-apply, and rollout-restart to publish changes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-html
data:
  index.html: |-
    <!doctype html>
    <html>
      <head><title>Workshop</title></head>
      <body>
        <h1>Hello from a ConfigMap</h1>
        <p>This page lives outside the container image — it survives rollouts.</p>
      </body>
    </html>
