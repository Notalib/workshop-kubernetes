# The module-1 Deployment, now wired to mount config from ConfigMaps.
# Fill in the TODOs as you work through TASK 1, 2, 4, 5.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  labels:
    app: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            # TASK 1: mount the HTML ConfigMap over nginx's web root.
            - name: html
              mountPath: # TODO: nginx serves files from which directory?

            # TASK 2: mount ONLY default.conf, leaving the rest of conf.d intact.
            # Uncomment this block for TASK 2.
            # - name: nginx-conf
            #   mountPath: /etc/nginx/conf.d/default.conf
            #   subPath: default.conf
            #   readOnly: true

          # TASK 4 / TASK 5: add an `env:` block here (see the README).

      volumes:
        - name: html
          configMap:
            # TODO: which ConfigMap holds index.html? (see html-configmap.yaml)
            name: # ___
        - name: nginx-conf
          configMap:
            name: demo-config
