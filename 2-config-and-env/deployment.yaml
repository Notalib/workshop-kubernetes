# SOLUTION — completed Deployment for module 2 (TASK 1, 2, 5).
# Mounts custom HTML and a single nginx config file, and reads an env var from a
# ConfigMap. Apply the two ConfigMaps first:
#   kubectl apply -f html-configmap.yaml -f nginx-conf-configmap.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  labels:
    app: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo
  template:
    metadata:
      labels:
        app: demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          volumeMounts:
            # TASK 1: custom HTML over nginx's web root.
            - name: html
              mountPath: /usr/share/nginx/html
            # TASK 2: just default.conf, via subPath (leaves the rest of conf.d intact).
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          # TASK 5: env var imported from the ConfigMap (vs. TASK 4's literal value).
          env:
            - name: GREETING
              valueFrom:
                configMapKeyRef:
                  name: demo-config
                  key: greeting
      volumes:
        - name: html
          configMap:
            name: demo-html
        - name: nginx-conf
          configMap:
            name: demo-config
